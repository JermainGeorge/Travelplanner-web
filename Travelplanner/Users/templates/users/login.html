{% extends "planner/base_auth.html" %}
{% load crispy_forms_tags %}
{% block content %}

    <div class="container p-3 my-3 bg-black text-white rounded">
    <h4>Welcome Back</h4>

    <div class="card p-4 shadow bg-dark text-white">
        <form method="POST">
            {% csrf_token %}

            <fieldset class="form-group">
                <legend class="border-bottom mb-4">Log In</legend>

                {{ form|crispy }}
            </fieldset>

            <div class="mt-3">
                <button class="btn btn-outline-info" type="submit">
                    Log In
                </button>
            </div>
        </form>

        <div class="border-top pt-3 mt-3">
            <small class="text-white">
                Need an account?
                <a class="ms-2 text-decoration-none text-info"
                   href="{% url 'users-register' %}">
                    Sign Up Now
                </a>
            </small>
        </div>
    </div>
</div>

{% endblock content %}
