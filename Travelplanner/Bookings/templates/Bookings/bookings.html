{% extends 'planner/base.html' %}
{% load crispy_forms_tags %}
{% block page_content %}
<section class="booking-dashboard">
  <div class="booking-tabs">
    <ul class="nav nav-pills" id="bookingTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link booking-tab active" data-bs-toggle="pill" data-bs-target="#trip" type="button" role="tab" aria-controls="trip" aria-selected="true">
          <i class="bi bi-geo-alt"></i>
          <span>Destination</span>
        </button>
      </li>

      <li class="nav-item" role="presentation">
        <button class="nav-link booking-tab" data-bs-toggle="pill" data-bs-target="#accommodation" type="button" role="tab" aria-controls="accommodation" aria-selected="false">
          <i class="bi bi-building"></i>
          <span>Stays</span>
        </button>
      </li>

      <li class="nav-item" role="presentation">
        <button class="nav-link booking-tab" data-bs-toggle="pill" data-bs-target="#vehicles" type="button" role="tab" aria-controls="vehicles" aria-selected="false">
          <i class="bi bi-car-front"></i>
          <span>Car rental</span>
        </button>
      </li>

      <li class="nav-item" role="presentation">
        <button class="nav-link booking-tab" data-bs-toggle="pill" data-bs-target="#receipts" type="button" role="tab" aria-controls="receipts" aria-selected="false">
          <i class="bi bi-receipt"></i>
          <span>Receipts</span>
        </button>
      </li>
    </ul>
  </div>

  <div class="container py-4">
    <div class="tab-content booking-panel">

            <div class="tab-pane fade show active" id="trip" role="tabpanel" tabindex="0">
            <h2>Destination</h2>
            <div class="booking-form-card mt-4">
              <form method="POST">
                {% csrf_token %}
                {{ d_form|crispy }}

                <button type="submit" name="destination_submit" class="btn btn-primary">Book Now</button>
              </form>
            </div>
            </div>

            <div class="tab-pane fade" id="accommodation" role="tabpanel" tabindex="0">
            <h2>Accommodation</h2>
            <div class="booking-form-card mt-4">
              <form method="POST">
                {% csrf_token %}
                {{ a_form|crispy }}

                <button type="submit" name="accommodation_submit" class="btn btn-primary">
                  Book Now
                </button>
              </form>
            </div>
            </div>

            <div class="tab-pane fade" id="vehicles" role="tabpanel" tabindex="0">
            <h2>Vehicles</h2>
            <div class="booking-form-card mt-4">
              <form method="POST">
                {% csrf_token %}
                {{ v_form|crispy }}

                <button type="submit" name="vehicle_submit" class="btn btn-primary">
                  Book Now
                </button>
              </form>
            </div>
            </div>

            <div class="tab-pane fade" id="receipts" role="tabpanel" tabindex="0">
            <h2>Receipts</h2>
            <div class="booking-form-card mt-4">
              <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                  <label class="form-label" for="payment_method">Payment method</label>
                  <select class="form-select" id="payment_method" name="payment_method">
                    <option value="mobile_money">Mobile Money</option>
                    <option value="card">Card</option>
                    <option value="bank_transfer">Bank Transfer</option>
                    <option value="cash">Cash</option>
                  </select>
                </div>
                <button type="submit" name="confirm_booking" class="btn btn-success">
                  Confirm Booking
                </button>
              </form>
            </div>
            </div>

  </div>
  </div>
</section>
{% endblock %}
