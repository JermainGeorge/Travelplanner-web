{% extends 'planner/base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
  <nav class="col-md-3 col-lg-2 d-md-block sidebar bg-primary position-sticky top-0">
  <ul class="nav flex-column nav-pills text-center" id="sidebar" role="tablist">

    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#trip" type="button">
        Trip Planner
      </button>
    </li>

    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="pill" data-bs-target="#accommodation" type="button">
        Accommodation
      </button>
    </li>

    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="pill" data-bs-target="#vehicles" type="button">
        Vehicles
      </button>
    </li>

    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="pill" data-bs-target="#receipts" type="button">
        Receipts
      </button>
    </li>

  </ul>
</nav>

    <!-- Main Content -->
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        <div class="tab-content">

            <div class="tab-pane fade show active" id="trip">
            <h2>Trip Planner</h2>
            <!--Booking form -->
            <div class="container mt-5">

              <h2>Create Booking</h2>

              <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}

                <button type="submit" class="btn btn-primary">Book Now</button>
              </form>

              
              <p class="mt-3">
                <a href="{% url 'receipts' %}" style="text-decoration: none; color: black;">
                  View Your Receipts
                </a>
              </p>
            </div>
            </div>

            <div class="tab-pane fade" id="accommodation">
            <h2>Accommodation</h2>
            </div>

            <div class="tab-pane fade" id="vehicles">
            <h2>Vehicles</h2>
            </div>

            <div class="tab-pane fade" id="receipts">
            <h2>Receipts</h2>
            </div>

        </div>
        </div>
    </main>

  </div>
</div>
{% endblock %}
